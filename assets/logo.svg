  </g>

  <g opacity="0.28" stroke="#000000" stroke-width="2" stroke-linecap="square">
    <path d="M61 42V140"/>
    <path d="M143 38V148"/>
    <path d="M302 34V146"/>
    <path d="M651 36V146"/>
    <path d="M887 36V148"/>
    <path d="M951 42V140"/>
  </g>
</svg>
